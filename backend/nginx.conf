# Nginx configuration for agent.influencerhq.io
# Copy to: /etc/nginx/sites-available/agent.influencerhq.io
# Then: sudo ln -s /etc/nginx/sites-available/agent.influencerhq.io /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name agent.influencerhq.io;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl;
    server_name agent.influencerhq.io;

    ssl_certificate /etc/letsencrypt/live/agent.influencerhq.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.influencerhq.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffer_size 0;
        proxy_buffers 0 0;
    }

    location /api/ {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
    }
}
