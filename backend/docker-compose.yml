version: '3.8'

services:
  imai-pro-api:
    build: .
    container_name: imai-pro-api
    ports:
      - "4050:4000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    networks:
      - imai-pro-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  imai-pro-network:
    driver: bridge
